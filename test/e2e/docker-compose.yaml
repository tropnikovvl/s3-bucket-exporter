services:
  motoserver:
    image: motoserver/moto:latest
    ports:
      - "5000:5000"
    profiles:
      - short
      - long

  s3-bucket-exporter:
    build:
      context: ../../
      dockerfile: Dockerfile
    depends_on:
      - motoserver
    environment:
      - S3_ACCESS_KEY=test
      - S3_SECRET_KEY=test
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://motoserver:5000
      - S3_FORCE_PATH_STYLE=true
      - SCRAPE_INTERVAL=3s
      - LOG_LEVEL=debug
    ports:
      - "9655:9655"
    profiles:
      - short
      - long

  test-runner-short:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - motoserver
      - s3-bucket-exporter
    environment:
      - S3_ACCESS_KEY=test
      - S3_SECRET_KEY=test
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://motoserver:5000
      - S3_EXPORTER_URL=http://s3-bucket-exporter:9655/metrics
      - TEST_PROFILE=short
    volumes:
      - ./tests:/app/tests
    profiles:
      - short

  test-runner-long:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - motoserver
      - s3-bucket-exporter
    environment:
      - S3_ACCESS_KEY=test
      - S3_SECRET_KEY=test
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://motoserver:5000
      - S3_EXPORTER_URL=http://s3-bucket-exporter:9655/metrics
      - TEST_PROFILE=long
    volumes:
      - ./tests:/app/tests
    profiles:
      - long
